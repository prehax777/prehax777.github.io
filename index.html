<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zex - Roblox Exploit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --color-bg: #0a0a0a; 
            --color-primary: #ffd700; 
            --color-text: #f0f0f0; 
            --color-button-hover: #ffc107; 
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color var(--transition-speed);
        }

        .container {
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border: 2px solid var(--color-primary); 
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); 
            animation: fadeIn 1.5s ease-out; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3em;
            color: var(--color-primary);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        p {
            margin-bottom: 50px; 
            font-size: 1.1em;
            opacity: 0.8;
        }

        .download-button {
            background-color: var(--color-primary);
            color: var(--color-bg); 
            border: none;
            padding: 18px 40px;
            font-size: 1.4em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition-speed) ease-in-out;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .download-button:hover {
            background-color: var(--color-button-hover);
            transform: translateY(-4px) scale(1.03); 
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.8);
        }

        .download-button i {
            margin-right: 12px;
            font-size: 1.3em;
        }

        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(3px); 
            animation: modalOpen 0.3s ease-out;
        }

        @keyframes modalOpen {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: var(--color-bg);
            margin: 15% auto; 
            padding: 40px;
            border: 3px solid var(--color-primary);
            border-radius: 12px;
            width: 80%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes modalSlide {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-button {
            color: var(--color-primary);
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color var(--transition-speed);
        }

        .close-button:hover,
        .close-button:focus {
            color: #fff;
            text-decoration: none;
        }

        .modal-content h2 {
            color: var(--color-primary);
            margin-bottom: 15px;
        }

        .modal-content p {
            font-size: 1.1em;
            opacity: 1;
            margin-bottom: 30px;
        }
        
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .info-button-modal {
            background-color: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }
        
        .info-button-modal:hover {
            background-color: var(--color-primary);
            color: var(--color-bg);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>ZEX</h1>
        <p>the next generation exploit for roblox. powerful, stable, and undetectable.</p>

        <button class="download-button" id="openModalBtn">
            <i class="fas fa-download"></i>
            Download Zex
        </button>
    </div>

    <div id="downloadModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModalBtn">&times;</span>
            <h2><i class="fas fa-clock" style="margin-right: 10px;"></i> Coming Soon!</h2>
            <p>Only in progress, please wait untill new version releases! click button here for more info</p>
            
            <div class="modal-actions">
                <button class="info-button-modal" id="openInfoBtn">View Details</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("downloadModal");
        const openBtn = document.getElementById("openModalBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        const openInfoBtn = document.getElementById("openInfoBtn");
        
        const GITHUB_MODULE = "https://github.com/prehax777/module/tree/main";
        const DISCORD_INVITE = "https://discord.gg/TjPrH3YBtK";

        openBtn.onclick = function() {
            modal.style.display = "block";
        }

        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
        
        openInfoBtn.onclick = function() {
            window.open(GITHUB_MODULE, '_blank'); 
            
            window.open(DISCORD_INVITE, '_blank')

            modal.style.display = "none";
        }
    </script>

</body>
</html>
